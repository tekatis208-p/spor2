<!DOCTYPE html>
<html lang="tr">
<head>
    
    <meta charset="UTF-8">
    <title>ses ekleme</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
    <meta charset="UTF-8">
    <title>Spor Dünyası</title>
    <style>
        background-color
        
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            
        }

        header {
            background: #1e90ff;
            color: white;
            padding: 20px;
            text-align: center;
        }

        nav {
            background: #333;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: #1e90ff;
        }

        .container {
            padding: 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            width: 250px;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            text-align: center;
        }

        .card img {
            width: 100%;
            border-radius: 10px;
        }

        footer {
            background: #1e90ff;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 20px;
        }

        .btn {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 15px;
            background: #1e90ff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .btn:hover {
            background: #0d6efd;
        }
         </style>
</head>
<body>
    <h1></h1>
    <audio controls>
     <source src="gol.mp3" type="audio/mpeg">
    </audio>
    <marquee behavior="scroll" direction="right">Spor hayatın tek gerçeği</marquee>

</marquee>

<header>
    <h1>⚽ Spor Dünyası</h1>
    <p>Futbol - Basketbol - Fitness</p>
</header>

<nav>
    <a href="#anasayfa">Anasayfa</a>
    <a href="#sporlar">Sporlar</a>
    <a href="#iletisim">İletişim</a>
</nav>

<section id="sporlar" class="container">

    <div class="card">
        <img src="https://images.unsplash.com/photo-1508098682722-e99c43a406b2" alt="Futbol">
        <h3>Futbol</h3>
        <p>Dünyanın en popüler sporudur.</p>
        <a href="https://www.tff.org" target="_blank" class="btn">Detay</a>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1519861531473-9200262188bf" alt="Basketbol">
        <h3>Basketbol</h3>
        <p>Hızlı ve heyecanlı bir takım sporudur.</p>
        <a href="https://www.nba.com" target="_blank" class="btn">Detay</a>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1517836357463-d25dfeac3438" alt="Fitness">
        <h3>Fitness</h3>
        <p>Sağlıklı yaşamın temelidir.</p>
        <a href="https://www.bodybuilding.com" target="_blank" class="btn">Detay</a>
    </div>

</section>

<footer id="iletisim">

</footer>
